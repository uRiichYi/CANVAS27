<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Canvas 27</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="/utility/logoCanvas27.png" type="image/png">
</head>
<body class="auth-page" data-page="login">

    <div class="auth-page__bg"></div>
    <div class="auth-page__grain" aria-hidden="true"></div>

    <main class="auth-page__content container px-3">
        <div class="row justify-content-center min-vh-100 align-items-center py-5">
            <div class="col-12 col-lg-10 col-xl-9">
                <div class="auth-shell">
                    <div class="auth-shell__aside d-none d-lg-flex">
                        <p class="auth-shell__eyebrow">Bienvenido de nuevo</p>
                        <h2 class="auth-shell__aside-title">CANVAS<br><span>27</span></h2>
                        <p class="auth-shell__aside-text">Accede para capturar obras, subirlas a la galería y compartir tu talento con el mundo.</p>
                        <ul class="auth-shell__features">
                            <li>Galería de artistas</li>
                            <li>Captura con cámara</li>
                            <li>Geolocalización de obras</li>
                        </ul>
                    </div>

                    <div class="auth-card card border-0">
                        <div class="card-body p-4 p-md-5">
                            <div class="text-center mb-4">
                                <a href="index.html" class="auth-card__logo d-inline-block mb-3">
                                    <img src="utility/LogoCanvas27W.svg" alt="Canvas 27" width="120" height="40">
                                </a>
                                <h1 class="auth-card__title mb-1 d-lg-none">CANVAS <span class="text-accent">27</span></h1>
                                <p class="auth-card__subtitle mb-0">Inicia sesión</p>
                            </div>

                            <div id="login-alert" class="alert d-none" role="alert"></div>

                            <form id="login-form" novalidate>
                                <div class="mb-3">
                                    <label for="login-email" class="form-label">Correo electrónico</label>
                                    <div class="input-group-canvas">
                                        <span class="input-group-canvas__icon" aria-hidden="true">@</span>
                                        <input type="email" class="form-control canvas-input" id="login-email" name="email" placeholder="tu@correo.com" autocomplete="email" required>
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <label for="login-password" class="form-label">Contraseña</label>
                                    <div class="input-group-canvas">
                                        <span class="input-group-canvas__icon" aria-hidden="true">✦</span>
                                        <input type="password" class="form-control canvas-input" id="login-password" name="password" placeholder="••••••••" autocomplete="current-password" required minlength="6">
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-canvas w-100 btn-lg auth-submit" id="login-submit">
                                    <span class="auth-submit__text">Entrar a Canvas 27</span>
                                </button>
                            </form>

                            <div class="auth-divider my-4"><span>o</span></div>

                            <p class="text-center mb-0 auth-card__footer">
                                ¿Nuevo artista?
                                <a href="register.html" class="link-accent fw-semibold">Crear cuenta</a>
                            </p>
                            <p class="text-center mt-2 mb-0">
                                <a href="index.html" class="link-muted">← Volver al inicio</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
