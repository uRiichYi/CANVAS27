<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura — Canvas 27</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="utility/LogoCanvas27.png" type="image/png">
</head>
<body class="capture-page" data-page="capture">

    <header class="capture-header py-3">
        <div class="container">
            <nav class="capture-nav d-flex flex-wrap justify-content-between align-items-center gap-2">
                <a href="index.html" class="capture-header__logo">
                    <img src="LogoCanvas27W.svg" alt="Canvas 27" height="40">
                </a>
                <ul class="capture-nav__links list-unstyled d-flex flex-wrap gap-3 mb-0">
                    <li><a href="gallery.html">Galería</a></li>
                    <li><a href="capture.html" class="nav-active">Captura</a></li>
                    <li><a href="register.html">Registro</a></li>
                </ul>
                <button type="button" class="btn btn-outline-canvas btn-sm" id="logout-btn">Cerrar sesión</button>
            </nav>
        </div>
    </header>

    <main class="container py-4 py-md-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8 col-xl-7">
                <header class="text-center mb-4">
                    <h1 class="capture-title mb-2">Captura tu obra</h1>
                </header>

                <div id="capture-alert" class="alert d-none" role="alert"></div>

                <div class="capture-status row g-2 mb-4">
                    <div class="col-6">
                        <div class="status-chip" id="status-camera" data-state="off">
                            <span class="status-chip__dot" id="status-camera-dot"></span>
                            <span id="status-camera-label">Cámara apagada</span>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="status-chip" id="status-location" data-state="pending">
                            <span class="status-chip__dot" id="status-location-dot"></span>
                            <span id="status-location-label">Ubicación pendiente</span>
                        </div>
                    </div>
                </div>

                <section class="camera-panel card border-0 shadow-lg mb-4">
                    <div class="card-body p-3 p-md-4">
                        <div class="camera-preview-wrap ratio ratio-4x3 mb-3 position-relative">
                            <video id="camera-preview" class="camera-preview" autoplay playsinline muted aria-label="Vista previa de cámara"></video>
                            <div id="camera-placeholder" class="camera-placeholder">
                                <p>Activa la cámara para comenzar</p>
                            </div>
                            <canvas id="photo-canvas" class="d-none" aria-hidden="true"></canvas>
                        </div>

                        <img id="photo-preview" class="photo-preview d-none img-fluid rounded mb-3 w-100" alt="Foto capturada">

                        <div class="d-grid gap-2 d-sm-flex flex-sm-wrap justify-content-center">
                            <button type="button" class="btn btn-canvas flex-sm-fill" id="start-camera-btn">Activar cámara</button>
                            <button type="button" class="btn btn-outline-canvas flex-sm-fill" id="take-photo-btn" disabled>Tomar foto</button>
                            <button type="button" class="btn btn-outline-canvas flex-sm-fill" id="retake-photo-btn" disabled>Otra toma</button>
                        </div>
                    </div>
                </section>

                <form id="upload-form" class="upload-panel card border-0 shadow-lg">
                    <div class="card-body p-3 p-md-4">
                        <div class="mb-3">
                            <label for="photo-title" class="form-label">Título de la obra</label>
                            <input type="text" class="form-control canvas-input" id="photo-title" name="title" placeholder="Mi obra" maxlength="120">
                        </div>
                        <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center mb-3">
                            <p class="form-hint mb-0" id="geo-hint">Toca para obtener tu ubicación (GPS).</p>
                            <button type="button" class="btn btn-outline-canvas btn-sm" id="geo-request-btn">Obtener ubicación</button>
                        </div>
                        <p class="form-hint mb-3 d-none" id="geo-coords-display"></p>
                        <button type="submit" class="btn btn-canvas w-100 btn-lg" id="upload-photo-btn" disabled>
                            Guardar en servidor
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
